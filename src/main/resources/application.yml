spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          naver:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          kakao:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-authentication-method: client_secret_post
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.apt
  configuration:
    map-underscore-to-camel-case: true

constants:
  jwt:
    issuer: ${CONSTANTS_JWT_ISSUER}
    bearer-format: ${CONSTANTS_JWT_BEARER_FORMAT}
    claim-key: ${CONSTANTS_JWT_CLAIM_KEY}
    secret-key: ${CONSTANTS_JWT_SECRET_KEY}
    access-token-cookie-name: ${CONSTANTS_JWT_ACCESS_TOKEN_COOKIE_NAME}
    access-token-cookie-path: ${CONSTANTS_JWT_ACCESS_TOKEN_COOKIE_PATH}
    access-token-cookie-validity-seconds: ${CONSTANTS_JWT_ACCESS_TOKEN_COOKIE_VALIDITY_SECONDS}
    access-token-validity-milliseconds: ${CONSTANTS_JWT_ACCESS_TOKEN_VALIDITY_MILLISECONDS}
    refresh-token-cookie-name: ${CONSTANTS_JWT_REFRESH_TOKEN_COOKIE_NAME}
    refresh-token-cookie-path: ${CONSTANTS_JWT_REFRESH_TOKEN_COOKIE_PATH}
    refresh-token-cookie-validity-seconds: ${CONSTANTS_JWT_REFRESH_TOKEN_COOKIE_VALIDITY_SECONDS}
    refresh-token-validity-milliseconds: ${CONSTANTS_JWT_REFRESH_TOKEN_VALIDITY_MILLISECONDS}

file:
  directory: ${FILE_DIRECTORY}

server:
  port: ${SERVER_PORT}
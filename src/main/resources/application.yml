spring:
  application:
    name: be-apten
  profiles:
    active: local  # 로컬 환경에서는 application-local.yml 사용
  datasource:
    url: ${DB_URL}                           # DB 접속 URL
    username: ${DB_USERNAME}                 # DB 계정
    password: ${DB_PASSWORD}                 # DB 비밀번호
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 소셜 로그인 OAuth2 설정
  security:
    oauth2:
      client:
        registration:

          # 구글 소셜 로그인 설정
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

          # 네이버 소셜 로그인 설정
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email

          # 카카오 소셜 로그인 설정
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-authentication-method: client_secret_post

        provider:
          # 네이버는 OIDC를 지원하지 않아 수동으로 엔드포인트 설정
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

          # 카카오도 수동으로 엔드포인트 설정
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.apt
  configuration:
    map-underscore-to-camel-case: true  # DB 컬럼 snake_case → Java camelCase 자동 변환

# JWT 토큰 설정
constants:
  jwt:
    issuer: apt-management
    bearer-format: JWT
    claim-key: user
    secret-key: ${JWT_SECRET_KEY:YXB0TWFuYWdlbWVudFNlY3JldEtleUZvckp3dEF1dGhQcm9qZWN0MjAyNA==}

    # Access Token 설정 (30분)
    access-token-cookie-name: at
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1800
    access-token-validity-milliseconds: 1800000

    # Refresh Token 설정 (7일)
    refresh-token-cookie-name: rt
    refresh-token-cookie-path: /api/auth/refresh
    refresh-token-cookie-validity-seconds: 604800
    refresh-token-validity-milliseconds: 604800000

server:
  port: 8080
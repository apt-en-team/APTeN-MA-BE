spring:
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/apten?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Gmail SMTP 설정 (비밀번호 찾기 메일 발송용)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password:  ${Password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
            client-authentication-method: client_secret_post
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.apt
  configuration:
    map-underscore-to-camel-case: true

constants:
  jwt:
    issuer: apt-management
    bearer-format: JWT
    claim-key: user
    secret-key: ${JWT_SECRET_KEY}
    access-token-cookie-name: at
    access-token-cookie-path: /
    access-token-cookie-validity-seconds: 1800
    access-token-validity-milliseconds: 1800000
    refresh-token-cookie-name: rt
    refresh-token-cookie-path: /api/auth/refresh
    refresh-token-cookie-validity-seconds: 604800
    refresh-token-validity-milliseconds: 604800000

server:
  port: 8080